  bio: >
    B.Med. from Xi'an Jiaotong University (2018). M.Med. in Clinical Medicine from Southwest Jiaotong University (2021), under the supervision of Prof. Yanjun Liu. Ph.D. in Dermatology and Venereology from Xiangya Hospital, Central South University, under the supervision of Prof. Ji Li.<br><br>
    Currently Assistant Research Fellow at Xiangya Hospital, Central South University.<br><br>
    Research focus: big-data approaches to skin health and aging.<br><br>
    Published 31 SCI papers as first/corresponding author — 11 in CAS Zone 1 or IF &gt; 10 — with cumulative impact factor over 200. Representative venues include <em>JAAD</em>, <em>Aging Cell</em>, <em>J Autoimmun</em>, <em>Int J Surg</em>, <em>Theranostics</em>, <em>Metabolism</em>, <em>J Med Virol</em>, and <em>Cell Death Dis</em>.<br><br>
    Recipient of the National Scholarship (2022 and 2024) and the CSU President's Innovation Award (2023); nominated for the CAST Young Talent Support Program (PhD Track).
  bio_zh: >
    2018 年毕业于西安交通大学临床医学（本科）；2021 年获西南交通大学临床医学学术型硕士学位，导师为刘雁军教授；于中南大学湘雅医院获皮肤病与性病博士学位，导师为李吉教授。<br><br>
    现任中南大学湘雅医院助理研究员。<br><br>
    研究方向：基于大数据的皮肤健康与衰老研究。<br><br>
    以第一作者/通讯作者发表 SCI 论文 31 篇，其中中科院 1 区或影响因子 10 分以上 11 篇，累计影响因子 200+；代表性期刊包括 <em>JAAD</em>、<em>Aging Cell</em>、<em>J Autoimmun</em>、<em>Int J Surg</em>、<em>Theranostics</em>、<em>Metabolism</em>、<em>J Med Virol</em>、<em>Cell Death Dis</em> 等。<br><br>
    获 2022、2024 年度国家奖学金，2023 年中南大学校长创新奖；入选湖南省科协提名"中国科协青年人才托举工程博士生专项计划"。

