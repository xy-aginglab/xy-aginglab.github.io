# Lab Members — Hunan Key Laboratory of Aging Biology
# Categories: pi, faculty, researcher, clinician

- name: 李吉
  name_en: Ji Li
  role: pi
  title: 主任医师，教授，博士生导师
  title_en: Director & Professor
  photo: https://hfmds.oss-cn-zhangjiakou.aliyuncs.com/mgccxcx/lj.png
  department: 皮肤科
  bio: >-
    衰老生物学湖南省重点实验室主任，中南大学湘雅医院皮肤科副主任。美国南加州大学博士后。
    教育部青年长江学者，湖南省杰出青年基金获得者。
    现任中国医师协会皮肤科医师分会玫瑰痤疮学组组长、中国整形美容协会形塑与综合技术转化分会常务理事、
    中国女医师协会皮肤病专家委员会常务委员、中国老年学和老年医学学会老年病学分会衰老基础医学专委会常务委员、
    湖南省医师协会皮肤科医师分会副会长。
    近年来一直从事损容性皮肤病（玫瑰痤疮、脱发性疾病及皮肤衰老）的临床与科研工作。
    主持国家自然科学基金6项及多项省厅级科研课题。
    获"中国女医师协会五洲女子科技奖"、"中国皮肤科优秀中青年医师奖"、
    "2021年度华夏医学科技奖"（排名第二）、"湖南省科学技术进步一等奖"（排名第二），获得国家发明专利2项。
    以第一/通讯作者在 EMBO Mol Med, EMBO J, JID 等杂志上发表 SCI 论文50余篇。

