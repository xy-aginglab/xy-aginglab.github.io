# Lab Members — Li Lab
# Categories: pi, basic_researcher, clinical_researcher, technician

- name: 李吉
  name_en: Ji Li
  role: pi
  title: 主任医师、教授、博士生导师
  title_en: Vice President of Xiangya Hospital, Professor, Doctoral Supervisor
  photo: /assets/img/members/lj.png
  department: 皮肤科
  department_en: Department of Dermatology
  email: liji_xy@csu.edu.cn
  researchgate: Ji-Li-130
  bio: >
    Vice President of Xiangya Hospital, Central South University. Director of Hunan Key Laboratory of Aging Biology. Postdoctoral fellow at University of Southern California. Recipient of the National Science Fund for Distinguished Young Scholars, MOE Young Changjiang Scholar.<br><br>
    Currently serves as Chair of the Rosacea Group, Chinese Medical Doctor Association Dermatology; Deputy Chair of the Trichology Group, CMA Dermatology; Vice Chair of the CMDA Postgraduate Medical Education Standards Committee; and Chair-Elect of the Hunan Medical Association Committee on Medicine & Aesthetics.<br><br>
    Research focus on pilosebaceous-related diseases (rosacea, alopecia) and skin aging — basic, clinical, and translational research. Led 1 National Key R&D Program and 6 NSFC projects. Published 120+ SCI papers as first/corresponding author in Cell, BMJ, Sci Adv, Dev Cell, EMBO J, JAAD, JAMA Dermatol, JID, etc. Led the first Chinese Expert Consensus and Guidelines on Rosacea. Holder of 5 national invention patents.<br><br>
    Deputy Editor-in-Chief of the National Standardized Residency Training Textbook "Dermatology and Venereology" (3rd ed.), Associate Editor of Sensory Neuroscience.<br><br>
    Recipient of the Hunan Science & Technology Progress Award (1st Prize, 2021), Huaxia Medical Science & Technology Award (1st Prize, 2021), CMA Medical Science & Technology Award (1st Prize, 2023), and the Wuzhou Women's Science & Technology Award.
  bio_zh: >
    中南大学湘雅医院副院长，衰老生物学湖南省重点实验室主任。美国南加州大学博士后。国家杰出青年基金获得者，教育部青年长江学者。<br><br>
    现兼任中国医师协会皮肤科医师分会玫瑰痤疮学组组长、中华医学会皮肤性病学分会毛发学组副组长、中国医师协会毕业后医学教育标准指南工作委员会副主任委员、湖南省医学会医学与美容专业委员会候任主任委员等。<br><br>
    主要从事毛囊皮脂腺相关疾病（玫瑰痤疮与脱发性疾病等）及皮肤衰老的基础临床与转化研究工作。主持科技部重点研发课题1项、国家自然科学基金6项及多项省厅级科研课题。以第一作者/通讯作者在Cell、BMJ、Sci Adv、Dev Cell、EMBO J、JAAD、JAMA Dermatol、JID等杂志上发表SCI论文120余篇。牵头制定首个《中国玫瑰痤疮诊疗专家共识》及《中国玫瑰痤疮诊疗指南》。获国家发明专利5项。<br><br>
    担任国家卫生健康委员会住院医师规范化培训规划教材《皮肤性病学》（第3版）副主编、Sensory Neuroscience杂志副主编。<br><br>
    获2021年湖南省科技进步一等奖（排名第二）、2021年华夏医学科技奖一等奖（排名第二）、2023年中华医学科技奖一等奖（排名第五）及"五洲女子科技奖"。

- name: 邓智利
  sort_key: "04"
  name_en: Zhili Deng
  role: basic_researcher
  title: 研究员、特聘教授、博士生导师、国家优青
  title_en: Research Fellow, Distinguished Professor, Doctoral Supervisor, NSFC Excellent Young Scholar
  photo: /assets/img/members/dzl.png
  department: 皮肤科
  department_en: Department of Dermatology
  bio: >
    Executive Deputy Director of Hunan Key Laboratory of Aging Biology. Recipient of the NSFC Excellent Young Scholars Fund.<br><br>
    Research focus on pilosebaceous-related diseases (hair disorders, rosacea) and skin aging — basic and translational research.<br><br>
    Member of CMA Dermatology Genetics Group, CRMA Dermatology Hair Rehabilitation Group, and Standing Committee Member of CMEA Dermatology & Health Promotion Committee.<br><br>
    Published 20+ SCI papers as first/corresponding author in Cell, Nat Commun (3 papers), Sci Adv, EMBO Mol Med, Adv Sci, JID, etc. Led 4 NSFC projects. Holder of 2 national invention patents.
  bio_zh: >
    衰老生物学湖南省重点实验室常务副主任。国家优秀青年基金获得者。<br><br>
    研究方向：毛囊皮脂腺相关疾病（毛发疾病、玫瑰痤疮等）及皮肤衰老的基础与转化研究。<br><br>
    中华医学会皮肤性病学分会遗传学组委员、中国康复医学会皮肤病康复专业委员会毛发康复学组委员、中国医药教育协会皮肤病与健康促进专业委员会常务委员。<br><br>
    近五年以第一/通讯作者在Cell、Nat Commun（3篇）、Sci Adv、EMBO Mol Med、Adv Sci、JID等杂志发表SCI论文20余篇，主持国家自然科学基金项目4项，获国家发明专利2项。

