- name: 李吉
  name_en: Ji Li
  role: pi
  title: 主任医师，教授，博士生导师
  title_en: Vice President of Xiangya Hospital, Professor, Doctoral Supervisor
  photo: /assets/img/members/lj.png
  department: 皮肤科
  department_en: Department of Dermatology
  email: liji_xy@csu.edu.cn
  orcid: "0000-0002-0000-0000"
  researchgate: Ji-Li-130
  bio: >
    Vice President of Xiangya Hospital, Central South University. Director of Hunan Key Laboratory of Aging Biology. Director of the Center for Skin Aging and Hair Regeneration Research, Xiangya Hospital.<br><br>
    Postdoctoral fellow at University of Southern California. Recipient of the National Science Fund for Distinguished Young Scholars, MOE Young Changjiang Scholar, and Hunan Outstanding Youth Fund.<br><br>
    Currently serves as Deputy Chair of the Trichology Group, CMA Dermatology; Chief Scientist of the Rosacea Research Collaborative, CMA Dermatology; and Vice Chair of the CMEA Dermatology & Health Promotion Committee.<br><br>
    Published 100+ SCI papers as first/corresponding author in Cell, BMJ, Nat Commun, Dev Cell, Sci Adv, EMBO J, JAMA Dermatol, JAAD, JID, etc. Led 1 National Key R&D Program and 7 NSFC projects.<br><br>
    Recipient of the Huaxia Medical Science & Technology Award (1st Prize, 2021) and the Hunan Science & Technology Progress Award (1st Prize, 2021). Holder of 5 national invention patents.
  bio_zh: >
    中南大学湘雅医院副院长，衰老生物学湖南省重点实验室主任，中南大学湘雅医院皮肤衰老与毛发再生研究中心主任。<br><br>
    美国南加州大学博士后。国家杰出青年基金获得者，教育部青年长江学者，湖南省杰出青年基金获得者。<br><br>
    现任中华医学会皮肤性病学分会毛发学组副组长、中华医学会皮肤性病学分会玫瑰痤疮研究协作组首席科学家、中国医药教育协会皮肤病与健康促进专业委员会副主任委员等。<br><br>
    近年来一直从事皮肤衰老与毛发再生、炎症性皮肤病的临床与科研工作。主持科技部重点研发课题1项、国家自然科学基金7项及多项省厅级科研课题。以第一作者/通讯作者在Cell, BMJ, Nat Commun, Dev Cell, Sci Adv, EMBO J, JAMA Dermatol, JAAD, JID等杂志上发表SCI论文100余篇。<br><br>
    获"华夏医学科技奖一等奖"（排名第二，2021）、"湖南省科学技术进步一等奖"（排名第二，2021）、"五洲女子科技奖"及"中国皮肤科优秀中青年医师奖"，获得国家发明专利5项。

