  photo: /assets/img/members/ty.png
  department: 皮肤科
  department_en: Department of Dermatology
  bio: >
    Visiting Scholar at Emory University, USA (2013-2015). Specializes in hair loss (alopecia), rosacea and other disfiguring skin diseases, and dermatologic surgery.<br><br>
    Currently serves as Member of the Mycology Group, CMA Dermatology; Member of the Dermatology Committee, Chinese Association of Gerontology and Geriatrics (CAGG); Member of the Hair Medicine &amp; Scalp Health Management Committee, CNMIA; Deputy Head of the Hair Science Group and Member of the Hair Transplantation Group, Hunan Association of Chinese General Medicine and Western Medicine; and Secretary of the Dermatologic Surgery Group, Hunan Medical Association.<br><br>
    Led 2 NSFC projects (1 Young Scientists Fund, 1 General Program) and 1 Hunan Natural Science Foundation General Program. Published 19 SCI papers as first or corresponding author (including co-first/co-corresponding) in journals such as <em>Nature Communications</em> and <em>Advanced Science</em>.
  bio_zh: >
    美国 Emory 大学访问学者（2013-2015 年）。主攻脱发、玫瑰痤疮等损容性皮肤病及皮肤外科。<br><br>
    现兼任中华医学会皮肤科分会真菌学组委员、中国老年保健医学研究会皮肤科分会委员、中国非公立医疗机构协会皮肤专业委员会毛发医学与头皮健康管理专业委员、湖南省中医药和中西医结合学会皮肤性病专业委员会毛发学组副组长、湖南省中医药和中西医结合学会医学美容专业委员会毛发移植学组委员、湖南省医学会皮肤外科学组秘书。<br><br>
    以第一作者/通讯作者（含共同第一/通讯）在 <em>Nature Communications</em>、<em>Advanced Science</em> 等高影响因子杂志发表 SCI 论文 19 篇。主持国家自然科学基金 2 项（青年基金 1 项、面上项目 1 项），湖南省自然科学基金面上项目 1 项。

