- name: 简丹
  sort_key: "03"
  name_en: Dan Jian
  role: clinical_researcher
  title: 教授、博士生导师
  title_en: Professor, Doctoral Supervisor
  photo: /assets/img/members/jd.png
  department: 皮肤科
  department_en: Department of Dermatology
  bio: >
    Visiting Scholar at University of Southern California (2013).<br><br>
    Serves on the 8th Editorial Board of <em>Chinese Journal of Aesthetic Medicine</em>, and as Standing Committee Member of the Anti-Aging Medicine Committee, the Precision &amp; Digital Medicine Branch of the Chinese Association of Plastics and Aesthetics, and the Women's Dermatology Committee of the Hunan Women Physicians Association.<br><br>
    Research focuses on the clinical and basic research of rosacea, as well as skin aging mechanisms. Led 1 NSFC Young Scientists Fund, 4 NSFC General Programs, and 2 Hunan Natural Science Foundation projects. Made significant contributions to rosacea clinical management and molecular mechanism research.<br><br>
    Contributed to the Chinese Rosacea Diagnostic Criteria, co-authored the <em>Chinese Rosacea Diagnosis and Treatment Guidelines</em>, and participated in the preparation of <em>Establishment and Application of the Chinese Rosacea Diagnosis and Treatment System</em> and <em>Expert Consensus on Intradermal Botulinum Toxin Type A for Persistent Erythema and Flushing in Rosacea</em>. Contributing author of the monograph <em>Rosacea</em>. Published over 40 peer-reviewed papers domestically and internationally.<br><br>
    Recipient of the "Outstanding Physician Award" from the Hunan Medical Plastic and Aesthetics Association and the 2017 CDA "Outstanding Young and Middle-aged Dermatologist of China" Award. Principal translator of 3 monographs including <em>Intense Pulsed Light in Medical Aesthetics</em>.
  bio_zh: >
    美国南加州大学访问学者（2013 年）。<br><br>
    现兼任《中国美容医学》第八届编辑委员会委员、中国整形美容协会抗衰老医学专业委员会及精准与数字医学分会常务委员、湖南省女医师协会女性皮肤病防治与健康专业委员会常务委员。<br><br>
    长期从事玫瑰痤疮的临床与基础研究工作及皮肤衰老相关机制的研究工作。主持国家自然科学基金青年项目 1 项、面上项目 4 项，湖南省自然科学基金 2 项。在玫瑰痤疮临床治疗及分子机制等研究方面取得多项重要成果。<br><br>
    参与制定玫瑰痤疮诊断标准，参与执笔《中国玫瑰痤疮诊疗指南》，参与编写《中国玫瑰痤疮诊疗体系的建立与应用》《A 型肉毒毒素皮内注射治疗玫瑰痤疮持久性红斑及潮红专家共识》等行业专家共识，参与撰写《玫瑰痤疮》专著。发表国内外论文 40 余篇。<br><br>
    荣获"湖南省医疗整形美容协会杰出医师"奖、2017 年 CDA"中国皮肤科优秀中青年医师"奖。主译《强脉冲光在医学美容中的应用》等著作 3 部。

- name: 唐言
  sort_key: "08"
  name_en: Yan Tang
  role: clinical_researcher
  title: 副主任医师、副研究员、博士生导师
