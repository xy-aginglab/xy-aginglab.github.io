  tagline: "聚焦皮肤衰老、毛囊再生与炎症性皮肤病，贯通临床皮肤科学与分子生物学，推动转化医学创新。"

home:
  about_body: >
    本实验室依托**中南大学湘雅医院**丰富的临床资源，致力于**临床皮肤科学**与**分子生物学**
    的交叉融合研究。在**李吉教授**的带领下，团队聚焦皮肤健康的生物学标志物发现与下一代干预策略的开发。
