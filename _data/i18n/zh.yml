research:
  rosacea_title: 玫瑰痤疮与化脓性汗腺炎
  rosacea_desc: >
    通过多组学、疾病模型与多中心临床试验，阐明玫瑰痤疮与化脓性汗腺炎的发病机制，开发靶向治疗策略。
  hair_title: 毛发疾病与再生
  hair_desc: >
    研究雄激素性秃发、白发及斑秃的分子机制，开发毛发再生策略与靶向临床干预手段。
  skin_aging_title: 皮肤衰老
  skin_aging_desc: >
    基于长寿队列、多组学与转化模型，研究皮肤衰老的核心机制，开发抗衰老干预策略。

