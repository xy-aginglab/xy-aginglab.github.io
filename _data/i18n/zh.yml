research:
  skin_aging_title: 皮肤衰老
  skin_aging_desc: >
    利用长寿人群队列、动物及细胞模型研究皮肤衰老的发生机制，并针对关键靶点进行抗衰老药物设计及研发。
  hair_follicle_title: 毛发疾病与毛发再生
  hair_follicle_desc: >
    整合临床资源、人源毛囊器官移植/培养模型、动物模型等手段，研究脱发性疾病/白发的发生机制，并针对关键靶点进行治疗药物设计及研发；同时，建立与优化基于人毛囊干细胞与间充质干细胞的毛囊重建技术。
  inflammatory_title: 炎症性皮肤病
  inflammatory_desc: >
    整合临床资源与动物及细胞模型，研究炎症性皮肤病（特别是损容性皮肤病，如玫瑰痤疮和痤疮等）的发病机制，并针对关键靶点进行治疗药物设计及研发。

