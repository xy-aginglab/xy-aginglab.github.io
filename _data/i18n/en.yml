  pilosebaceous_title: Pilosebaceous-Related Diseases
  pilosebaceous_desc: >
    Studying the pathogenesis of alopecia, hair graying, rosacea, and acne,
    and developing targeted therapeutics and hair follicle reconstruction technologies.
