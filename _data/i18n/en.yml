research:
  skin_aging_title: Skin Aging & Longevity
  skin_aging_desc: >
    Integrating multi-omics data from longevity cohorts to identify novel biomarkers,
    explore cellular senescence, and validate anti-aging compounds.
  hair_follicle_title: Hair Follicle Biology
  hair_follicle_desc: >
    Deciphering hair growth and regeneration mechanisms, pioneering stem cell-based
    reconstruction and small-molecule therapies for alopecia.
  inflammatory_title: Inflammatory Skin Diseases
  inflammatory_desc: >
    Characterizing immune-microbial interactions to develop precise, targeted therapeutic
    strategies for rosacea, acne, and related conditions.

