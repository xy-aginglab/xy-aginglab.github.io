# Research direction narratives for the v2 homepage
# Each direction contains bilingual narrative text with inline DOI-linked citations

- id: pilosebaceous
  title: "Pilosebaceous-Related Diseases"
  title_zh: "皮脂腺相关疾病"
  summary: "Decoding the pathogenic mechanisms of rosacea, alopecia, and hair graying to develop targeted therapies through multi-omics, disease models, and clinical trials."
  summary_zh: "通过多组学、疾病模型与临床试验，解码玫瑰痤疮、脱发及白发的发病机制，开发靶向治疗策略。"
  link: "/v2/projects/"
  narrative: |
    <h3>Rosacea &amp; Inflammatory Skin Diseases</h3>
    <p>
      Rosacea is a chronic inflammatory skin disorder that significantly impacts quality of life, yet its pathogenesis remains incompletely understood. Our laboratory has established a comprehensive research framework spanning metabolomics, single-cell transcriptomics, neurogenic signaling, and genetics to uncover the multi-dimensional mechanisms underlying this disease.
    </p>
    <p>
      A landmark study identified alpha-ketoglutarate (&alpha;-KG) as a rosacea-associated metabolite that activates the vascular smooth muscle receptor OXGR1, promoting vasoconstriction and limiting pathological vasodilation. Cryo-electron microscopy structures of the OXGR1&ndash;Gq complex guided the development of A-1, a synthetic selective agonist that mitigates erythema with efficacy comparable to first-line therapy (<a href="https://doi.org/10.1016/j.cell.2026.01.036" class="v2-cite" target="_blank"><em>Cell</em> 2026</a>). At the cellular level, single-cell transcriptomics revealed that pro-inflammatory fibroblasts are the leading source of vasodilative signals in rosacea lesions, with PTGDS depletion blocking disease development in mice (<a href="https://doi.org/10.1038/s41467-024-52946-7" class="v2-cite" target="_blank"><em>Nat Commun</em> 2024</a>). Complementing this, we demonstrated that high-sensitivity sensory neurons activate &gamma;&delta; T cells via a CGRP&ndash;RAMP1 axis, establishing a neuro-immune circuit that drives facial hypersensitivity (<a href="https://doi.org/10.1038/s41467-024-50970-1" class="v2-cite" target="_blank"><em>Nat Commun</em> 2024</a>).
    </p>
    <p>
      Genetically, whole-genome sequencing of rosacea families identified rare variants in LRRC4, SH3PXD2A, and SLC26A8 that converge on neural synaptic processes and promote excessive neuropeptide release (<a href="https://doi.org/10.1038/s41467-023-39761-2" class="v2-cite" target="_blank"><em>Nat Commun</em> 2023</a>). Serum proteomic profiling further resolved two distinct molecular endotypes&mdash;inflammatory-predominant and neurogenic-metabolic&mdash;providing a molecular foundation for personalized treatment (<a href="https://doi.org/10.1016/j.jaad.2025.08.014" class="v2-cite" target="_blank"><em>JAAD</em> 2026</a>). Key inflammatory pathways including STAT3/IL-36G (<a href="https://doi.org/10.1016/j.jare.2024.06.013" class="v2-cite" target="_blank"><em>J Adv Res</em> 2025</a>), KRT6A/JAK1-STAT3 (<a href="https://doi.org/10.1186/s12929-025-01143-9" class="v2-cite" target="_blank"><em>J Biomed Sci</em> 2025</a>), and Nav1.8-mediated ROS signaling (<a href="https://doi.org/10.1016/j.redox.2022.102427" class="v2-cite" target="_blank"><em>Redox Biol</em> 2022</a>) have been dissected, while novel nanozyme-based ROS scavengers offer new therapeutic paradigms (<a href="https://doi.org/10.1016/j.redox.2024.103055" class="v2-cite" target="_blank"><em>Redox Biol</em> 2024</a>).
    </p>
    <p>
      These mechanistic insights have been translated into clinical practice through multicenter randomized controlled trials, demonstrating the efficacy of paroxetine for refractory erythema (<a href="https://doi.org/10.1016/j.jaad.2023.01.044" class="v2-cite" target="_blank"><em>JAAD</em> 2023</a>) and hydroxychloroquine as a novel treatment option (<a href="https://doi.org/10.1016/j.jaad.2020.04.013" class="v2-cite" target="_blank"><em>JAAD</em> 2021</a>).
    </p>

    <h3>Hair Disorders &amp; Regeneration</h3>
    <p>
      Androgenetic alopecia (AGA) manifests as progressive hair follicle miniaturization, yet its cellular drivers have remained elusive. Our single-cell transcriptomic atlas of human AGA anagen follicles revealed that hypercontractility of the connective tissue sheath (CTS) activates the mechanosensitive channel PIEZO1, inducing ectopic apoptosis of progenitor cells and driving progressive miniaturization. Pharmacological inhibition via the MLCK inhibitor ML-7 restored hair growth in patient-derived ex vivo models and humanized mice (<a href="https://doi.org/10.1038/s41467-026-70153-4" class="v2-cite" target="_blank"><em>Nat Commun</em> 2026</a>). Metabolic profiling further identified arginine deficiency as a core pathogenic driver: downregulation of the transporter SLC7A1 and upregulation of ARG2 trigger ROS accumulation and mTOR inactivation, while microneedle-based arginine replenishment restores hair growth (<a href="https://doi.org/10.1002/advs.202504579" class="v2-cite" target="_blank"><em>Adv Sci</em> 2025</a>).
    </p>
    <p>
      In hair pigmentation and regeneration, skin organoids derived from melanocyte progenitors revealed a two-step patterning mechanism: COL6A3&ndash;CD44 signaling maintains organotypic melanocytes during culture, while SEMA3C&ndash;NRP1 signaling guides their migration to the bulge niche during morphogenesis (<a href="https://doi.org/10.1002/advs.202502436" class="v2-cite" target="_blank"><em>Adv Sci</em> 2025</a>). Foundational work on dermal papilla niche signaling showed that Hedgehog overactivation reprograms niche fibroblasts to produce SCUBE3, a TGF-&beta; ligand sufficient to induce new hair growth (<a href="https://doi.org/10.1016/j.devcel.2022.06.005" class="v2-cite" target="_blank"><em>Dev Cell</em> 2022</a>).
    </p>
    <p>
      For alopecia areata, a series of real-world clinical studies have established ritlecitinib as an effective treatment across diverse patient populations, including adolescents and patients refractory to prior JAK inhibitor therapy (<a href="https://doi.org/10.1016/j.jaad.2025.07.008" class="v2-cite" target="_blank"><em>JAAD</em> 2025</a>; <a href="https://doi.org/10.1016/j.jaad.2026.01.017" class="v2-cite" target="_blank"><em>JAAD</em> 2026</a>).
    </p>
  narrative_zh: |
    <h3>玫瑰痤疮与炎症性皮肤病</h3>
    <p>
      玫瑰痤疮是一种严重影响生活质量的慢性炎症性皮肤病，其发病机制尚未被完全阐明。我们实验室建立了涵盖代谢组学、单细胞转录组学、神经源性信号和遗传学的综合研究体系，多维度揭示该疾病的发病机制。
    </p>
    <p>
      一项里程碑式研究发现&alpha;-酮戊二酸（&alpha;-KG）是玫瑰痤疮相关代谢物，能够激活血管平滑肌受体OXGR1，促进血管收缩并限制病理性血管扩张。基于OXGR1-Gq复合物的冷冻电镜结构，我们开发了合成选择性激动剂A-1，其改善红斑的疗效可与一线治疗媲美（<a href="https://doi.org/10.1016/j.cell.2026.01.036" class="v2-cite" target="_blank"><em>Cell</em> 2026</a>）。在细胞水平，单细胞转录组学揭示促炎成纤维细胞是玫瑰痤疮病变中血管扩张信号的主要来源，敲除PTGDS可阻断小鼠疾病进展（<a href="https://doi.org/10.1038/s41467-024-52946-7" class="v2-cite" target="_blank"><em>Nat Commun</em> 2024</a>）。同时，我们证明高敏感性感觉神经元通过CGRP-RAMP1轴直接激活&gamma;&delta; T细胞，建立了驱动面部超敏反应的神经免疫回路（<a href="https://doi.org/10.1038/s41467-024-50970-1" class="v2-cite" target="_blank"><em>Nat Commun</em> 2024</a>）。
    </p>
    <p>
      在遗传学层面，玫瑰痤疮家系的全基因组测序发现LRRC4、SH3PXD2A和SLC26A8的罕见变异均汇聚于神经突触过程，促进过度神经肽释放（<a href="https://doi.org/10.1038/s41467-023-39761-2" class="v2-cite" target="_blank"><em>Nat Commun</em> 2023</a>）。血清蛋白质组学进一步解析出两种分子内型——炎症主导型和神经源性-代谢型——为个性化治疗提供了分子基础（<a href="https://doi.org/10.1016/j.jaad.2025.08.014" class="v2-cite" target="_blank"><em>JAAD</em> 2026</a>）。STAT3/IL-36G（<a href="https://doi.org/10.1016/j.jare.2024.06.013" class="v2-cite" target="_blank"><em>J Adv Res</em> 2025</a>）、KRT6A/JAK1-STAT3（<a href="https://doi.org/10.1186/s12929-025-01143-9" class="v2-cite" target="_blank"><em>J Biomed Sci</em> 2025</a>）以及Nav1.8介导的ROS信号通路（<a href="https://doi.org/10.1016/j.redox.2022.102427" class="v2-cite" target="_blank"><em>Redox Biol</em> 2022</a>）等关键炎症通路已被系统解析，新型纳米酶ROS清除剂为治疗提供了新范式（<a href="https://doi.org/10.1016/j.redox.2024.103055" class="v2-cite" target="_blank"><em>Redox Biol</em> 2024</a>）。
    </p>
    <p>
      这些机制发现已通过多中心随机对照试验转化为临床实践，证实帕罗西汀治疗难治性红斑（<a href="https://doi.org/10.1016/j.jaad.2023.01.044" class="v2-cite" target="_blank"><em>JAAD</em> 2023</a>）以及羟氯喹作为新型治疗选择（<a href="https://doi.org/10.1016/j.jaad.2020.04.013" class="v2-cite" target="_blank"><em>JAAD</em> 2021</a>）的有效性。
    </p>

    <h3>毛发疾病与再生</h3>
    <p>
      雄激素性脱发（AGA）表现为毛囊渐进性微型化，但其细胞驱动因素长期不明。我们构建的人类AGA生长期毛囊单细胞转录组图谱揭示，结缔组织鞘（CTS）过度收缩激活机械敏感通道PIEZO1，诱导祖细胞异位凋亡并驱动渐进性微型化。MLCK抑制剂ML-7在患者来源的离体模型和人源化小鼠中均可恢复毛发生长（<a href="https://doi.org/10.1038/s41467-026-70153-4" class="v2-cite" target="_blank"><em>Nat Commun</em> 2026</a>）。代谢谱分析进一步发现精氨酸缺乏是AGA的核心致病因素：SLC7A1下调和ARG2上调导致ROS蓄积和mTOR失活，而微针精氨酸补充可恢复毛发生长（<a href="https://doi.org/10.1002/advs.202504579" class="v2-cite" target="_blank"><em>Adv Sci</em> 2025</a>）。
    </p>
    <p>
      在毛发色素和再生领域，源自黑色素细胞祖细胞的皮肤类器官揭示了两步模式化机制：培养期间COL6A3-CD44信号维持类器官黑色素细胞，而形态发生期间SEMA3C-NRP1信号引导其迁移至隆突干细胞龛（<a href="https://doi.org/10.1002/advs.202502436" class="v2-cite" target="_blank"><em>Adv Sci</em> 2025</a>）。关于毛乳头龛信号的基础研究表明，Hedgehog信号过度激活可重编程龛成纤维细胞产生SCUBE3（一种TGF-&beta;配体），足以诱导新毛发生长（<a href="https://doi.org/10.1016/j.devcel.2022.06.005" class="v2-cite" target="_blank"><em>Dev Cell</em> 2022</a>）。
    </p>
    <p>
      针对斑秃，一系列真实世界临床研究证实利特昔替尼在不同患者群体中（包括青少年和既往JAK抑制剂难治患者）均具有良好疗效（<a href="https://doi.org/10.1016/j.jaad.2025.07.008" class="v2-cite" target="_blank"><em>JAAD</em> 2025</a>；<a href="https://doi.org/10.1016/j.jaad.2026.01.017" class="v2-cite" target="_blank"><em>JAAD</em> 2026</a>）。
    </p>

- id: skin-aging
  title: "Skin Aging"
  title_zh: "皮肤衰老"
  summary: "Investigating the fundamental mechanisms of skin aging through longevity cohorts, multi-omics, and translational models to develop anti-aging interventions."
  summary_zh: "通过长寿队列、多组学和转化模型研究皮肤衰老的基本机制，开发抗衰老干预策略。"
  link: "/v2/projects/"
  narrative: |
    <p>
      Aging is a complex, multifactorial process that affects every organ, with the skin serving as one of the most visible and accessible models for studying its biology. Our laboratory investigates the fundamental mechanisms of skin aging through an integrated approach combining longevity population cohorts, multi-omics technologies, and advanced cellular and animal models.
    </p>
    <p>
      As a core member of the Aging Biomarker Consortium&mdash;a national initiative to establish standardized aging biomarkers across organ systems in China (<a href="https://doi.org/10.1038/s41591-023-02444-y" class="v2-cite" target="_blank"><em>Nat Med</em> 2023</a>)&mdash;we leverage large-scale cohort data to decode aging trajectories. A key discovery from longevity cohort transcriptomics revealed that ETS1 governs healthy aging by downregulating ribosomal protein gene expression, reducing energy-intensive ribosomal biogenesis as an adaptive energy-saving mechanism (<a href="https://doi.org/10.1126/sciadv.abf2017" class="v2-cite" target="_blank"><em>Sci Adv</em> 2022</a>).
    </p>
    <p>
      At the epigenetic level, we uncovered that depletion of the m<sup>6</sup>A demethylase FTO drives heterochromatin loss through a KAT8/RSF1 acetylation cascade, directly linking RNA modification to chromatin remodeling in skin aging (<a href="https://doi.org/10.1002/mco2.70205" class="v2-cite" target="_blank"><em>MedComm</em> 2025</a>). In parallel, we identified the voltage-gated sodium channel Nav1.8 in keratinocytes as a novel regulator of ROS-mediated inflammation: Nav1.8 binds SOD2 directly, preventing its mitochondrial localization and driving ROS accumulation that fuels inflammatory responses in the aging skin (<a href="https://doi.org/10.1016/j.redox.2022.102427" class="v2-cite" target="_blank"><em>Redox Biol</em> 2022</a>). The transcription factor regulatory network has been further elucidated with the discovery that HOXC10 delays fibroblast senescence via the FZD6/Wnt/&beta;-catenin pathway, with simvastatin identified as a functional mimic through Connectivity Map screening (<a href="https://doi.org/10.34133/research.0976" class="v2-cite" target="_blank"><em>Research</em> 2025</a>).
    </p>
    <p>
      These foundational discoveries are driving the rational design of anti-aging therapeutics, with the overarching goal of translating molecular insights from longevity populations and cellular senescence mechanisms into effective clinical interventions.
    </p>
  narrative_zh: |
    <p>
      衰老是一个复杂的多因素过程，影响每个器官，而皮肤作为最直观、最易获取的模型之一，是研究衰老生物学的理想对象。我们实验室通过长寿人群队列、多组学技术以及先进的细胞和动物模型，综合研究皮肤衰老的基本机制。
    </p>
    <p>
      作为衰老生物标志物联盟（Aging Biomarker Consortium）的核心成员——该联盟是中国建立跨器官系统标准化衰老生物标志物的国家级项目（<a href="https://doi.org/10.1038/s41591-023-02444-y" class="v2-cite" target="_blank"><em>Nat Med</em> 2023</a>）——我们利用大规模队列数据解码衰老轨迹。长寿队列转录组学的一项关键发现揭示，ETS1通过下调核糖体蛋白基因表达来调控健康衰老，减少能量密集型核糖体生物合成，作为适应性节能机制（<a href="https://doi.org/10.1126/sciadv.abf2017" class="v2-cite" target="_blank"><em>Sci Adv</em> 2022</a>）。
    </p>
    <p>
      在表观遗传水平，我们发现m<sup>6</sup>A去甲基化酶FTO的缺失通过KAT8/RSF1乙酰化级联反应驱动异染色质丢失，直接将RNA修饰与皮肤衰老中的染色质重塑相联系（<a href="https://doi.org/10.1002/mco2.70205" class="v2-cite" target="_blank"><em>MedComm</em> 2025</a>）。同时，我们发现角质形成细胞中的电压门控钠通道Nav1.8是ROS介导炎症的新型调控因子：Nav1.8直接结合SOD2，阻止其线粒体定位并驱动ROS蓄积，加速衰老皮肤的炎症反应（<a href="https://doi.org/10.1016/j.redox.2022.102427" class="v2-cite" target="_blank"><em>Redox Biol</em> 2022</a>）。转录因子调控网络也进一步阐明：HOXC10通过FZD6/Wnt/&beta;-catenin通路延缓成纤维细胞衰老，并通过Connectivity Map筛选发现辛伐他汀可作为其功能模拟物（<a href="https://doi.org/10.34133/research.0976" class="v2-cite" target="_blank"><em>Research</em> 2025</a>）。
    </p>
    <p>
      这些基础发现正在推动抗衰老治疗策略的理性设计，最终目标是将长寿人群和细胞衰老机制的分子洞见转化为有效的临床干预手段。
    </p>
