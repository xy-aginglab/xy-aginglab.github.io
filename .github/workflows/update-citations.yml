name: Update citation counts

on:
  schedule:
    # Run every Wednesday at 10:00 UTC (18:00 CST)
    - cron: '0 10 * * 3'
  workflow_dispatch:  # Allow manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run citation updater
        run: python scripts/update_citations.py || true

      - name: Check for changes
        id: check
        run: |
          if git diff --quiet _data/citations.yml _bibliography/papers.bib 2>/dev/null; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.check.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.yml _bibliography/papers.bib
          git commit -m "chore(auto): update citation counts from OpenAlex"
          git push
