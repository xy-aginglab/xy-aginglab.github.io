<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d4a5a"/>
      <stop offset="100%" stop-color="#14a3b8"/>
    </linearGradient>
    <linearGradient id="cell1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64dcff" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0f7b8a" stop-opacity="0.15"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="12" fill="url(#bg1)"/>

  <!-- Grid overlay -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="260"/><line x1="160" y1="0" x2="160" y2="260"/>
    <line x1="240" y1="0" x2="240" y2="260"/><line x1="320" y1="0" x2="320" y2="260"/>
  </g>

  <!-- DNA double helix (left side) -->
  <g transform="translate(70, 30)" opacity="0.9">
    <!-- Left strand -->
    <path d="M0,0 C15,20 -15,40 0,60 C15,80 -15,100 0,120 C15,140 -15,160 0,180"
          stroke="#64dcff" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Right strand -->
    <path d="M30,0 C15,20 45,40 30,60 C15,80 45,100 30,120 C15,140 45,160 30,180"
          stroke="#a8ecf7" stroke-width="2.5" fill="none" stroke-linecap="round"/>
    <!-- Base pairs -->
    <g stroke="rgba(255,255,255,0.35)" stroke-width="1.5">
      <line x1="5" y1="15" x2="25" y2="15"/>
      <line x1="-5" y1="45" x2="35" y2="45"/>
      <line x1="5" y1="75" x2="25" y2="75"/>
      <line x1="-5" y1="105" x2="35" y2="105"/>
      <line x1="5" y1="135" x2="25" y2="135"/>
      <line x1="-5" y1="165" x2="35" y2="165"/>
    </g>
    <!-- Damage mark -->
    <circle cx="15" cy="105" r="8" fill="none" stroke="#ff6b6b" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.7"/>
    <text x="15" y="109" text-anchor="middle" fill="#ff6b6b" font-size="10" font-weight="bold" opacity="0.8">✕</text>
  </g>

  <!-- Cell / senescence (center) -->
  <g transform="translate(200, 130)">
    <!-- Cell membrane -->
    <ellipse cx="0" cy="0" rx="55" ry="45" fill="url(#cell1)" stroke="#64dcff" stroke-width="1.5" opacity="0.8"/>
    <!-- Nucleus -->
    <ellipse cx="0" cy="0" rx="22" ry="18" fill="rgba(100,220,255,0.15)" stroke="#a8ecf7" stroke-width="1"/>
    <!-- Chromatin dots -->
    <circle cx="-8" cy="-5" r="3" fill="#64dcff" opacity="0.5"/>
    <circle cx="5" cy="3" r="4" fill="#64dcff" opacity="0.4"/>
    <circle cx="-3" cy="7" r="2.5" fill="#64dcff" opacity="0.45"/>
    <!-- Senescence markers (small dots around cell) -->
    <g fill="#ffb347" opacity="0.6">
      <circle cx="50" cy="-15" r="3"/><circle cx="45" cy="20" r="2.5"/>
      <circle cx="-48" cy="10" r="2.5"/><circle cx="-40" cy="-25" r="3"/>
      <circle cx="20" cy="-42" r="2"/><circle cx="-15" cy="40" r="2.5"/>
    </g>
  </g>

  <!-- Clock / aging symbol (right side) -->
  <g transform="translate(320, 80)">
    <circle cx="0" cy="0" r="35" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="32" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="8"/>
    <!-- Clock hands -->
    <line x1="0" y1="0" x2="0" y2="-22" stroke="#a8ecf7" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="0" x2="14" y2="-8" stroke="#64dcff" stroke-width="1.5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="2.5" fill="#64dcff"/>
    <!-- Hour marks -->
    <g fill="rgba(255,255,255,0.3)">
      <circle cx="0" cy="-28" r="1.5"/><circle cx="14" cy="-24" r="1.5"/>
      <circle cx="24" cy="-14" r="1.5"/><circle cx="28" cy="0" r="1.5"/>
      <circle cx="24" cy="14" r="1.5"/><circle cx="14" cy="24" r="1.5"/>
      <circle cx="0" cy="28" r="1.5"/><circle cx="-14" cy="24" r="1.5"/>
      <circle cx="-24" cy="14" r="1.5"/><circle cx="-28" cy="0" r="1.5"/>
      <circle cx="-24" cy="-14" r="1.5"/><circle cx="-14" cy="-24" r="1.5"/>
    </g>
    <!-- Arrow (aging direction) -->
    <path d="M22,28 C30,35 38,30 42,22" stroke="#ffb347" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.7"/>
    <polygon points="44,22 38,20 40,26" fill="#ffb347" opacity="0.7"/>
  </g>

  <!-- Floating particles -->
  <g fill="#64dcff" opacity="0.2">
    <circle cx="150" cy="40" r="2"/><circle cx="280" cy="200" r="1.5"/>
    <circle cx="350" cy="170" r="2"/><circle cx="130" cy="220" r="1.5"/>
    <circle cx="250" cy="50" r="1"/><circle cx="370" cy="240" r="1.5"/>
  </g>
</svg>
