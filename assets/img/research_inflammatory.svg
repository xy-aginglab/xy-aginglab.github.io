<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 260" fill="none">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="400" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d5a56"/>
      <stop offset="100%" stop-color="#14b8a3"/>
    </linearGradient>
    <radialGradient id="immune" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#14b8a3" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0d5a56" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="260" rx="12" fill="url(#bg3)"/>

  <!-- Grid overlay -->
  <g stroke="rgba(255,255,255,0.04)" stroke-width="0.5">
    <line x1="0" y1="50" x2="400" y2="50"/><line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/><line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="260"/><line x1="160" y1="0" x2="160" y2="260"/>
    <line x1="240" y1="0" x2="240" y2="260"/><line x1="320" y1="0" x2="320" y2="260"/>
  </g>

  <!-- Skin layers (top) -->
  <g opacity="0.6">
    <!-- Epidermis -->
    <path d="M0,60 Q50,55 100,58 Q150,61 200,57 Q250,53 300,58 Q350,62 400,56" stroke="rgba(255,255,255,0.3)" stroke-width="1.5" fill="none"/>
    <!-- Dermis boundary -->
    <path d="M0,90 Q50,95 100,88 Q150,92 200,87 Q250,93 300,89 Q350,85 400,90" stroke="rgba(255,255,255,0.15)" stroke-width="1" fill="none"/>
  </g>

  <!-- T cells -->
  <g>
    <circle cx="120" cy="130" r="16" fill="url(#immune)" stroke="#76d7c4" stroke-width="1.5"/>
    <text x="120" y="134" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif" font-weight="600">T</text>

    <circle cx="270" cy="110" r="14" fill="url(#immune)" stroke="#76d7c4" stroke-width="1.5"/>
    <text x="270" y="114" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10" font-family="Inter,sans-serif" font-weight="600">T</text>
  </g>

  <!-- Macrophage -->
  <g transform="translate(190, 160)">
    <ellipse cx="0" cy="0" rx="20" ry="17" fill="url(#immune)" stroke="#a9dfbf" stroke-width="1.5"/>
    <text x="0" y="4" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9" font-family="Inter,sans-serif" font-weight="600">Mφ</text>
    <!-- Pseudopods -->
    <path d="M-18,-8 C-28,-15 -30,-5 -22,-2" stroke="#a9dfbf" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M18,5 C28,2 30,12 22,10" stroke="#a9dfbf" stroke-width="1" fill="none" opacity="0.5"/>
  </g>

  <!-- Neutrophil -->
  <g transform="translate(80, 190)">
    <circle cx="0" cy="0" r="13" fill="url(#immune)" stroke="#76d7c4" stroke-width="1.5"/>
    <!-- Multi-lobed nucleus -->
    <circle cx="-4" cy="-3" r="4" fill="rgba(118,215,196,0.3)"/>
    <circle cx="3" cy="2" r="3.5" fill="rgba(118,215,196,0.3)"/>
    <circle cx="-2" cy="4" r="3" fill="rgba(118,215,196,0.3)"/>
  </g>

  <!-- Cytokine signaling (arrows/dots) -->
  <g opacity="0.5">
    <!-- IL signals from T cell to macrophage -->
    <g fill="#ff8a65">
      <circle cx="140" cy="140" r="2"/><circle cx="155" cy="148" r="1.5"/>
      <circle cx="168" cy="153" r="2"/><circle cx="178" cy="157" r="1.5"/>
    </g>
    <!-- TNF signals -->
    <g fill="#ffb74d">
      <circle cx="210" cy="155" r="1.5"/><circle cx="225" cy="145" r="2"/>
      <circle cx="240" cy="135" r="1.5"/><circle cx="253" cy="122" r="2"/>
    </g>
    <!-- From neutrophil -->
    <g fill="#ef9a9a">
      <circle cx="95" cy="185" r="1.5"/><circle cx="110" cy="178" r="2"/>
      <circle cx="125" cy="170" r="1.5"/>
    </g>
  </g>

  <!-- Inflammation hotspot -->
  <g transform="translate(310, 170)">
    <circle cx="0" cy="0" r="25" fill="none" stroke="#ef5350" stroke-width="1" stroke-dasharray="4,3" opacity="0.4"/>
    <circle cx="0" cy="0" r="15" fill="none" stroke="#ef5350" stroke-width="1" stroke-dasharray="3,2" opacity="0.3"/>
    <circle cx="0" cy="0" r="6" fill="#ef5350" opacity="0.15"/>
    <!-- Redness indicator -->
    <g fill="#ef5350" opacity="0.4">
      <circle cx="-5" cy="-3" r="2"/><circle cx="4" cy="2" r="2.5"/>
      <circle cx="-2" cy="5" r="1.5"/>
    </g>
  </g>

  <!-- Shield / therapy target (bottom right) -->
  <g transform="translate(350, 220)" opacity="0.4">
    <path d="M0,-18 L15,-10 L15,5 L0,15 L-15,5 L-15,-10 Z" fill="none" stroke="#76d7c4" stroke-width="1.5"/>
    <path d="M-5,0 L0,5 L8,-5" stroke="#76d7c4" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Blood vessel (bottom) -->
  <g opacity="0.35">
    <path d="M30,230 Q100,220 170,228 Q240,236 310,225 Q350,220 400,230" stroke="#ef9a9a" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M30,238 Q100,228 170,236 Q240,244 310,233 Q350,228 400,238" stroke="#ef9a9a" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Floating particles -->
  <g fill="#76d7c4" opacity="0.15">
    <circle cx="50" cy="30" r="2"/><circle cx="340" cy="40" r="1.5"/>
    <circle cx="150" cy="240" r="2"/><circle cx="250" cy="30" r="1"/>
    <circle cx="380" cy="130" r="1.5"/><circle cx="20" cy="140" r="1.5"/>
  </g>
</svg>
