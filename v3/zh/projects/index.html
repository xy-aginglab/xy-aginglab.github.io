    <article id="pilosebaceous-unit-diseases" class="v3-program-entry">
      <h2>毛囊皮脂腺相关疾病</h2>
      <div class="v3-program-entry__media">
        <img src="/assets/img/research_hair_follicle.png" alt="毛囊皮脂腺相关疾病">
      </div>
      <div class="v3-program-entry__content">
        <p>我们的研究涵盖毛囊皮脂腺单位疾病的全谱——从脱发、白发到玫瑰痤疮和痤疮。我们结合临床队列、人源毛囊器官培养模型、动物模型和单细胞组学技术，阐明疾病机制，开发靶向小分子药物，并建立基于干细胞的毛囊重建技术。</p>
      </div>
    </article>
  
    <article id="skin-aging" class="v3-program-entry">
      <h2>皮肤衰老</h2>
      <div class="v3-program-entry__media">
        <img src="/assets/img/research_skin_aging.png" alt="皮肤衰老">
      </div>
      <div class="v3-program-entry__content">
        <p>通过长寿人群队列多组学分析揭示衰老机制，探索细胞衰老在皮肤微环境中的作用，设计开发针对关键分子通路的抗衰老药物。</p>
      </div>
    </article>
